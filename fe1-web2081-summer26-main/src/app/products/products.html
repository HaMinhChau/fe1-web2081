<div class="min-h-[80vh] bg-gray-100 p-8">

  <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-lg p-8">

    <h1 class="text-3xl font-bold text-blue-600 mb-2">
      📋 Danh sách sản phẩm
    </h1>

    <p class="text-gray-500 mb-8">
      Các sản phẩm hiện có trong hệ thống.
    </p>

    <div class="space-y-4">
      @for (product of products; track product) {
        <div class="flex items-center justify-between bg-gray-50 border rounded-xl p-4 hover:bg-gray-100 transition">
          <div>
            <p class="text-sm text-gray-500">Sản phẩm</p>
            <p class="text-lg font-semibold">{{ product }}</p>
          </div>

          <button class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg">
            Xem
          </button>
        </div>
      }
    </div>

  </div>

</div>
